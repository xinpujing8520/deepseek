name: Daily DeepSeek Content

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Generate 1-9 articles"
        required: false
        default: "1"

permissions:
  contents: write

concurrency:
  group: daily-content
  cancel-in-progress: false

jobs:
  generate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install
        run: npm install

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-articles.mjs --count=${{ github.event.inputs.count || '1' }}

      - name: Commit generated article
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content
          if git diff --cached --quiet; then
            echo "No generated content changes."
          else
            git commit -m "Add daily DeepSeek article"
            git push
          fi

      - name: Build
        env:
          ELEVENTY_ENV: production
        run: npm run build
