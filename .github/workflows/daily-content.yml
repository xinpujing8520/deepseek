name: Daily DeepSeek Content

on:
  schedule:
    - cron: "12 0 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Generate 1-9 articles"
        required: false
        default: "1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TZ: "Asia/Shanghai"

permissions:
  contents: write

concurrency:
  group: daily-content-go-deepseek
  cancel-in-progress: false

jobs:
  generate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm install

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-articles.mjs --count=${{ github.event.inputs.count || '1' }}

      - name: Add internal links to new posts
        run: node tools/add-internal-links.js

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content keywords.json
          if git diff --cached --quiet; then
            echo "No generated content changes."
          else
            git commit -m "Add daily DeepSeek article with internal links"
            git push
          fi

      - name: Validate SVG assets
        run: npm run validate:svg

      - name: Build site
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BING_SITE_AUTH: ${{ secrets.BING_SITE_AUTH }}
        run: |
          if [ -n "$INDEXNOW_KEY" ]; then
            printf '%s' "$INDEXNOW_KEY" > "./${INDEXNOW_KEY}.txt"
          fi
          if [ -n "$BING_SITE_AUTH" ]; then
            printf '<?xml version="1.0"?>\n<users>\n  <user>%s</user>\n</users>\n' "$BING_SITE_AUTH" > ./BingSiteAuth.xml
          fi
          npm run build
          if [ -n "$INDEXNOW_KEY" ]; then
            printf '%s' "$INDEXNOW_KEY" > "./_site/${INDEXNOW_KEY}.txt"
          fi
          if [ -n "$BING_SITE_AUTH" ] && [ -f ./BingSiteAuth.xml ]; then
            cp ./BingSiteAuth.xml ./_site/BingSiteAuth.xml
          fi

      - name: Execute Instant SEO Push to Bing
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BING_DOMAIN: go-deepseek.com
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "INDEXNOW_KEY not set, skip push."
            exit 0
          fi
          DOMAIN="go-deepseek.com"
          VALIDATION_URL="https://${DOMAIN}/${INDEXNOW_KEY}.txt"
          for i in $(seq 1 30); do
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${VALIDATION_URL}")
            if [ "$STATUS_CODE" = "200" ]; then
              echo "IndexNow validation file is live."
              break
            fi
            echo "Waiting for CDN (${STATUS_CODE}) attempt ${i}/30..."
            sleep 5
          done
          node tools/bing-instant-push.js

      - name: Push indexable URLs to Baidu
        env:
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
          BAIDU_PUSH_SITE: go-deepseek.com
        run: |
          if [ -z "$BAIDU_PUSH_TOKEN" ]; then
            echo "BAIDU_PUSH_TOKEN not set, skip Baidu push."
            exit 0
          fi
          node tools/baidu-url-push.js
